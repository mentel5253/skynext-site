backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: he

collections:

  - name: "settings"
    label: "⚙️ הגדרות האתר"
    files:
      - name: "general"
        label: "כללי"
        file: "_data/settings.json"
        fields:
          - { label: "שם החברה", name: "company_name", widget: "string" }
          - { label: "תיאור קצר", name: "description", widget: "text" }
          - { label: "טלפון", name: "phone", widget: "string" }
          - { label: "וואטסאפ", name: "whatsapp", widget: "string" }
          - { label: "לינקדאין URL", name: "linkedin", widget: "string" }
          - { label: "קישור מערכת למידה", name: "learning_link", widget: "string" }

  - name: "services"
    label: "🎯 שירותים"
    folder: "_data/services"
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: "כותרת", name: "title", widget: "string" }
      - { label: "אייקון", name: "icon", widget: "string" }
      - { label: "תג", name: "tag", widget: "string" }
      - { label: "תיאור קצר", name: "desc", widget: "text" }
      - { label: "תמונה", name: "image", widget: "image", required: false }
      - { label: "פרטים מלאים", name: "details", widget: "markdown" }
      - label: "יתרונות"
        name: "benefits"
        widget: "list"
        field: { label: "יתרון", name: "item", widget: "string" }
      - { label: "סדר", name: "order", widget: "number", default: 0 }

  - name: "about"
    label: "👤 אודות"
    files:
      - name: "about"
        label: "תוכן אודות"
        file: "_data/about.json"
        fields:
          - { label: "כותרת", name: "title", widget: "string" }
          - { label: "תיאור", name: "desc", widget: "text" }
          - { label: "תמונה", name: "image", widget: "image", required: false }
          - { label: "תווית זהב שורה 1", name: "accent_top", widget: "string" }
          - { label: "תווית זהב שורה 2", name: "accent_bottom", widget: "string" }
          - label: "רשימת הישגים"
            name: "list"
            widget: "list"
            field: { label: "הישג", name: "item", widget: "string" }

  - name: "gallery"
    label: "🖼️ גלריה"
    folder: "_data/gallery"
    create: true
    slug: "{{slug}}"
    identifier_field: caption
    fields:
      - { label: "כיתוב", name: "caption", widget: "string" }
      - { label: "תמונה", name: "image", widget: "image" }
      - { label: "סדר", name: "order", widget: "number", default: 0 }

  - name: "articles"
    label: "📰 כתבות"
    folder: "_data/articles"
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: "כותרת", name: "title", widget: "string" }
      - { label: "תג", name: "tag", widget: "string" }
      - { label: "תיאור", name: "desc", widget: "text" }
      - { label: "תמונה", name: "image", widget: "image", required: false }
      - { label: "קישור", name: "link", widget: "string", required: false }
      - { label: "טקסט כפתור", name: "link_text", widget: "string", default: "קרא עוד ←" }

  - name: "faq"
    label: "❓ שאלות ותשובות"
    folder: "_data/faq"
    create: true
    slug: "{{slug}}"
    identifier_field: question
    fields:
      - { label: "שאלה", name: "question", widget: "string" }
      - { label: "תשובה", name: "answer", widget: "text" }
      - { label: "סדר", name: "order", widget: "number", default: 0 }
