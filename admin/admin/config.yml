backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/skynext
  branch: main
  base_url: https://api.netlify.com

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: he

collections:

  - name: "settings"
    label: "⚙️ הגדרות האתר"
    files:
      - name: "general"
        label: "כללי"
        file: "_data/settings.json"
        fields:
          - { label: "שם החברה", name: "company_name", widget: "string", default: "SkyNext UAV Solutions" }
          - { label: "תיאור קצר (SEO)", name: "description", widget: "text" }
          - { label: "טלפון", name: "phone", widget: "string" }
          - { label: "וואטסאפ (עם קוד מדינה)", name: "whatsapp", widget: "string", hint: "לדוגמה: 9720506277304" }
          - { label: "לינקדאין URL", name: "linkedin", widget: "string" }
          - { label: "קישור מערכת למידה", name: "learning_link", widget: "string" }

  - name: "hero"
    label: "🏠 Hero — עמוד ראשי"
    files:
      - name: "hero"
        label: "תוכן Hero"
        file: "_data/hero.json"
        fields:
          - { label: "Badge (טקסט קטן מעל)", name: "badge", widget: "string" }
          - { label: "כותרת — מילה ראשונה (זהב)", name: "title1", widget: "string" }
          - { label: "כותרת — המשך", name: "title2", widget: "string" }
          - { label: "תת-כותרת", name: "subtitle", widget: "string" }
          - { label: "תיאור", name: "desc", widget: "text" }
          - { label: "טקסט כפתור ראשי", name: "btn1", widget: "string" }
          - { label: "טקסט כפתור משני", name: "btn2", widget: "string" }

  - name: "services"
    label: "🎯 שירותים"
    folder: "_data/services"
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: "כותרת השירות", name: "title", widget: "string" }
      - { label: "אייקון (emoji)", name: "icon", widget: "string", default: "⭐" }
      - { label: "תג", name: "tag", widget: "string" }
      - { label: "תיאור קצר (בכרטיס)", name: "desc", widget: "text" }
      - { label: "תמונה ראשית", name: "image", widget: "image", required: false }
      - { label: "פרטי השירות (טקסט מלא)", name: "details", widget: "markdown" }
      - label: "יתרונות"
        name: "benefits"
        widget: "list"
        field: { label: "יתרון", name: "item", widget: "string" }
      - { label: "סדר תצוגה", name: "order", widget: "number", default: 0 }

  - name: "about"
    label: "👤 אודות"
    files:
      - name: "about"
        label: "תוכן אודות"
        file: "_data/about.json"
        fields:
          - { label: "Badge", name: "badge", widget: "string" }
          - { label: "כותרת", name: "title", widget: "string" }
          - { label: "תיאור", name: "desc", widget: "text" }
          - { label: "תמונה", name: "image", widget: "image", required: false }
          - { label: "תווית זהב שורה 1", name: "accent_top", widget: "string" }
          - { label: "תווית זהב שורה 2", name: "accent_bottom", widget: "string" }
          - label: "רשימת הישגים"
            name: "list"
            widget: "list"
            field: { label: "הישג", name: "item", widget: "string" }

  - name: "gallery"
    label: "🖼️ גלריה"
    folder: "_data/gallery"
    create: true
    slug: "{{slug}}"
    identifier_field: caption
    fields:
      - { label: "כיתוב", name: "caption", widget: "string" }
      - { label: "תמונה", name: "image", widget: "image" }
      - { label: "סדר", name: "order", widget: "number", default: 0 }

  - name: "articles"
    label: "📰 כתבות ופרויקטים"
    folder: "_data/articles"
    create: true
    slug: "{{slug}}"
    identifier_field: title
    fields:
      - { label: "כותרת", name: "title", widget: "string" }
      - { label: "תג (קטגוריה)", name: "tag", widget: "string" }
      - { label: "תיאור", name: "desc", widget: "text" }
      - { label: "תמונה", name: "image", widget: "image", required: false }
      - { label: "קישור לכתבה", name: "link", widget: "string", required: false }
      - { label: "טקסט הכפתור", name: "link_text", widget: "string", default: "קרא עוד ←" }
      - { label: "תאריך", name: "date", widget: "datetime", required: false }

  - name: "faq"
    label: "❓ שאלות ותשובות"
    folder: "_data/faq"
    create: true
    slug: "{{slug}}"
    identifier_field: question
    fields:
      - { label: "שאלה", name: "question", widget: "string" }
      - { label: "תשובה", name: "answer", widget: "text" }
      - { label: "סדר", name: "order", widget: "number", default: 0 }

  - name: "pages"
    label: "📄 דפים"
    files:
      - name: "privacy"
        label: "מדיניות פרטיות"
        file: "_data/privacy.md"
        fields:
          - { label: "תוכן", name: "body", widget: "markdown" }
      - name: "accessibility"
        label: "הצהרת נגישות"
        file: "_data/accessibility.md"
        fields:
          - { label: "תוכן", name: "body", widget: "markdown" }
